<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head-fragment('Movies')}"></head>

<body>

    <main>
        <h1 th:replace="~{fragments :: H1('Best movies of the year')}"></h1>
        <ul>
            <li th:each="movie : ${movies}" class="card">
                <div th:replace="~{fragments :: card(${movie})}"></div>
            </li>
        </ul>
    </main>
    
</body>
</html>
