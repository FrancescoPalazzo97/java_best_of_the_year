<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">


<head th:replace="~{fragments :: head-fragment('Songs')}"></head>


<body>

    <main>
        <h1 th:replace="~{fragments :: H1('Best songs of the year')}"></h1>
        <ul>
            <li th:each="song : ${songs}" class="card">
                <div th:replace="~{fragments :: card(${song})}"></div>
            </li>
        </ul>
    </main>
    
</body>
</html>
